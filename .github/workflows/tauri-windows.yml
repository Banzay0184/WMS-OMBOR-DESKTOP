# Windows-установщик Tauri (NSIS .exe) в облаке GitHub.
# Артефакт: весь bundle/ (nsis, msi и т.д.)

name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri
        # В package.json скрипт "tauri": "tauri" — нужен именно CLI: tauri build (не "npm run tauri build")
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL || 'https://api.wms-ombor.uz' }}
        run: npx tauri build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: desktop/src-tauri/target/release/bundle/
